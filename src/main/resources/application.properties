spring.application.name=book-keeping-tool
spring.data.jdbc.dialect=postgresql
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.liquibase.change-log=classpath:/db/changelog/changelog-main.yaml
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
server.servlet.context-path=/bookkeeping
bookkeeping.ai.cost-center.enabled=${AI_COST_CENTER_ENABLED:false}
bookkeeping.ai.cost-center.api-key=${ANTHROPIC_API_KEY:}
bookkeeping.ai.cost-center.model=${ANTHROPIC_MODEL:claude-3-5-haiku-latest}
bookkeeping.ai.cost-center.confidence-threshold=${AI_COST_CENTER_CONFIDENCE_THRESHOLD:0.75}
bookkeeping.ai.cost-center.max-batch-size=${AI_COST_CENTER_MAX_BATCH_SIZE:25}
bookkeeping.ai.cost-center.timeout=${AI_COST_CENTER_TIMEOUT:10s}
